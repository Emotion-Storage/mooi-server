spring:
  datasource:
    # Prefer provider-agnostic DB_* variables for the Neon migration.
    # The RDS_* fallback keeps the legacy AWS production setup bootable.
    url: ${DB_URL:jdbc:mysql://${RDS_HOST}:${RDS_PORT}/${RDS_DATABASE}?useSSL=true&requireSSL=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:${RDS_USERNAME}}
    password: ${DB_PASSWORD:${RDS_PASSWORD}}
    driver-class-name: ${DB_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.MySQL8Dialect}
        format_sql: false

  security:
    oauth2:
      google:
        client-ids: ${GOOGLE_CLIENT_IDS}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

  flyway:
    locations: classpath:db/migration
#    baseline-on-migrate: false 1회 배포 후 변경 필요
auth:
  refresh:
    expiration-days: ${REFRESH_TOKEN_EXPIRATION_DAYS}

jwt:
  secret: ${JWT_SECRET}
  access-token:
    expiration-minutes: ${ACCESS_TOKEN_EXPIRATION_MINUTES}

ai:
  websocket:
    url: ${AI_WEBSOCKET_URL}
    timeout: 30000
  server:
    base-url: ${AI_SERVER_BASE_URL}

monitoring:
  discord:
    enabled: false
    error-webhook-url: ${DISCORD_ERROR_WEBHOOK_URL:}

apple:
  audience: ${APPLE_BUNDLE_ID}
